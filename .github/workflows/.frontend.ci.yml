name: Frontend

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    name: It lints and builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "18"
      - run: cd src/Logitar.Cms.Ui && npm install
      - run: cd src/Logitar.Cms.Ui && npm run lint
      - run: cd src/Logitar.Cms.Ui && npm run build

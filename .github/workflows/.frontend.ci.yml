name: Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Get logitar-ui repository
        uses: actions/checkout@v3
        with:
          repository: Logitar/logitar-ui
          ref: 8-ongoing-implementation-of-mui-components-for-mvp
          path: logitar-ui

      - name: Get CMS repository
        uses: actions/checkout@v3
        with:
          repository: Logitar/CMS
          ref: main
          path: CMS

      - name: Link logitar-ui to CMS
        run: |
          cd logitar-ui
          npm link
          cd ../CMS/src/Logitar.Cms.Ui
          npm link @logitar/logitar-ui

      - name: Install dependencies
        run: |
          npm install

      - name: Lint & Build
        run: |
          npm run lint
          npm run build

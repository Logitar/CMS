name: Frontend

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest        
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '18'
      - run: cd src/Logitar.Cms.Ui
      - run: npm install
      - run: npm run lint
      - run: npm run build
